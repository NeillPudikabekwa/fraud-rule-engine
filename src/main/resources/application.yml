spring:
  application:
    name: fraud-rule-engine
  datasource:
    url: jdbc:h2:file:/data/fraud-rule-engine;AUTO_SERVER=TRUE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

fraud:
  rules:
    highAmountThreshold: 50000
    velocityWindowMinutes: 10
    velocityTransactionLimit: 3
    highRiskCountries: NG,RU,KP,IR
